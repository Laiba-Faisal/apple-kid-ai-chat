<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Chat Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --panel-bg: rgba(17, 24, 39, 0.85);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --accent-primary: #7c3aed;
            --accent-secondary: #4f46e5;
            --accent-gradient: linear-gradient(135deg, #7c3aed, #4f46e5);
            --accent-teal: #06b6d4;
            --success-color: #10b981;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: var(--bg-color);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Widget Header */
        .widget-header {
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border-color);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .assistant-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .avatar {
            width: 32px;
            height: 32px;
            background: var(--accent-gradient);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            color: #fff;
            box-shadow: 0 0 10px rgba(124, 58, 237, 0.3);
        }

        .name-text h4 {
            font-size: 13.5px;
            font-weight: 600;
        }

        .name-text span {
            font-size: 10px;
            color: var(--success-color);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .name-text span::before {
            content: '';
            display: inline-block;
            width: 6px;
            height: 6px;
            background: var(--success-color);
            border-radius: 50%;
        }

        .clear-chat-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 12px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .clear-chat-btn:hover {
            color: var(--text-primary);
        }

        /* Messages Pane */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message-bubble {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 14px;
            font-size: 13.5px;
            line-height: 1.5;
            animation: slideIn 0.25s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .bubble-user {
            background: var(--accent-gradient);
            color: #fff;
            align-self: flex-end;
            border-bottom-right-radius: 3px;
            box-shadow: 0 4px 10px rgba(79, 70, 229, 0.1);
        }

        .bubble-bot {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            align-self: flex-start;
            border-bottom-left-radius: 3px;
        }

        .citation {
            background: rgba(6, 182, 212, 0.15);
            color: var(--accent-teal);
            border: 1px solid rgba(6, 182, 212, 0.3);
            border-radius: 3px;
            padding: 0 4px;
            font-size: 10.5px;
            font-weight: 700;
            margin: 0 1px;
            display: inline-block;
        }

        /* Input Bar */
        .input-bar {
            background: var(--panel-bg);
            border-top: 1px solid var(--border-color);
            padding: 14px 16px;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-shrink: 0;
        }

        .chat-input {
            flex: 1;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 10px 14px;
            color: var(--text-primary);
            font-size: 13px;
            outline: none;
            transition: all 0.2s;
        }

        .chat-input:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 10px rgba(124, 58, 237, 0.1);
        }

        .send-btn {
            background: var(--accent-gradient);
            border: none;
            color: #fff;
            padding: 10px 16px;
            font-size: 13px;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .send-btn:hover {
            transform: scale(1.02);
        }
    </style>
</head>
<body>

    <div class="widget-header">
        <div class="assistant-info">
            <div class="avatar">AI</div>
            <div class="name-text">
                <h4 id="assistantName">Knowledge Agent</h4>
                <span>Online</span>
            </div>
        </div>
        <button class="clear-chat-btn" onclick="clearConversation()">Clear</button>
    </div>

    <div class="messages-container" id="chatArea">
        <div class="message-bubble bubble-bot" id="initialGreeting">
            Hello! I can answer questions grounded in our verified database. How can I help you today?
        </div>
    </div>

    <form class="input-bar" onsubmit="sendMessage(event)">
        <input type="text" id="userInput" class="chat-input" placeholder="Type your question..." required autocomplete="off">
        <button type="submit" class="send-btn">Send</button>
    </form>

    <script>
        // Resolve API key and details
        const urlParams = new URLSearchParams(window.location.search);
        const apiKey = urlParams.get('api_key');
        
        let sessionId = localStorage.getItem('rbs_rag_widget_session') || uuidv4();
        localStorage.setItem('rbs_rag_widget_session', sessionId);

        function uuidv4() {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                var r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }

        function clearConversation() {
            const chatArea = document.getElementById('chatArea');
            chatArea.innerHTML = `
                <div class="message-bubble bubble-bot">
                    Hello! I can answer questions grounded in our verified database. How can I help you today?
                </div>
            `;
            sessionId = uuidv4();
            localStorage.setItem('rbs_rag_widget_session', sessionId);
        }

        async function sendMessage(event) {
            event.preventDefault();
            const input = document.getElementById('userInput');
            const query = input.value.trim();
            if (!query) return;

            if (!apiKey) {
                alert("Error: Client API key is missing. Add ?api_key=YOUR_KEY to the iframe source URL.");
                return;
            }

            // Append user message
            const chatArea = document.getElementById('chatArea');
            const userBubble = document.createElement('div');
            userBubble.className = 'message-bubble bubble-user';
            userBubble.innerText = query;
            chatArea.appendChild(userBubble);
            chatArea.scrollTop = chatArea.scrollHeight;

            input.value = '';

            // Append bot thinking message
            const botBubble = document.createElement('div');
            botBubble.className = 'message-bubble bubble-bot';
            botBubble.innerHTML = `<i>Generating answer...</i>`;
            chatArea.appendChild(botBubble);
            chatArea.scrollTop = chatArea.scrollHeight;

            try {
                const response = await fetch('/api/v1/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-API-Key': apiKey
                    },
                    body: JSON.stringify({
                        query: query,
                        session_id: sessionId,
                        user_id: 'widget-user'
                    })
                });

                if (!response.ok) {
                    const err = await response.json();
                    botBubble.innerHTML = `<span style="color:var(--error-color);">Failed to retrieve answer: ${err.detail || 'check system status.'}</span>`;
                    return;
                }

                const res = await response.json();
                
                // Format response text to link citations
                let formattedText = res.answer.replace(/\[(\d+)\]/g, (match, num) => {
                    return `<span class="citation" title="Verified source index ${num}">[${num}]</span>`;
                });
                
                botBubble.innerHTML = formattedText;

            } catch (err) {
                botBubble.innerHTML = `<i>Could not reach backend API services.</i>`;
            }

            chatArea.scrollTop = chatArea.scrollHeight;
        }
    </script>
</body>
</html>
